<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <title>Fun With Graphs</title>
</head>
<body>
    <div class="app">
        <canvas id="canvas">
             Your browser does not support the HTML5 canvas tag.
        </canvas>

        <div class="action-zone">
            <h1><span onclick="switchMode('graph')">Graph</span> <span onclick="switchMode('tree')" class="title-small">Tree</span></h1>

            <div>
                <input type="checkbox" id="connect-when-inserting-input">
                <label for="connect-when-inserting-input">Connect all</label>
            </div>
            <input type="button" id="connect-nodes-button" value="Connect Nodes" class="hidden">
        </div>

        <div class="sidepanel">
            <div class="node-info">
                <div>
                    <input type="checkbox" id="directed-edges-input" disabled>
                    <label for="directed-edges-input">Directed edges</label>
                </div>
                <div>
                    <input type="checkbox" id="show-weights-input">
                    <label for="show-weights-input">Show weights</label>
                </div>
                <div>
                    <input type="text" id="node-label-input" style="width: 3rem;" disabled>
                    <label for="node-label-input">Node label</label>
                </div>
                <div>
                    <input type="text" id="edge-weight-input" style="width: 3rem;" disabled>
                    <label for="edge-weight-input">Edge weight</label>
                </div>
            </div>

            <button id="has-cycle-button">Has cycle?</button>
            <input type="button" id="select-mst-kruskal-button" value="Select MST (Kruskal)">
            <input type="button" id="select-mst-prim-button" value="Select MST (Prim)">
            <input type="button" id="select-vertex-cover-button" value="Select min. vertex cover" disabled>
            <input type="button" id="select-dominating-set-button" value="Select min. dominating set" disabled>
            <input type="button" id="select-maximum-matching-button" value="Select max. matching" disabled>
            <input type="button" id="select-maximum-matching-button" value="Select max. independent set" disabled>
            <input type="button" id="random-coloring-button" value="Color nodes randomly">
            <input type="button" id="color-components-button" value="Color components">
            <input type="button" id="color-refinement-button" value="Color refinement step">
        </div>

        <div class="bottompanel">
            <input type="button" id="clear-button" value="Clear selection">
            
            <div>
                <input type="checkbox" id="stop-force-input" checked />
                <label for="stop-force-input">Force</label>
            </div>

            <div class="right">
                <input type="button" id="triangle-button" value="Triangle">
                <input type="button" id="pentagon-button" value="Pentagon">
                <input type="button" id="adjacency-matrix-button" value="Input adjacency matrix">
                <input type="button" id="random-graph-button" value="Random graph with size k">
            </div>
        </div>
    </div>

    <script src="algorithms.js"></script>
    <script src="app.js"></script>
</body>
</html>
